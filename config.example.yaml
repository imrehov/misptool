misp:
# no / at the end
  url: "https://YOUR_MISP.com"
# api key
  key: "YOUR_API_KEY"
  verify_ssl: false

#misp polling rate
polling:
  interval_seconds: 60
#how far to go back in event history
  lookback_minutes: 10

notifications:
# Optional
  discord_webhook: "YOUR_DISCORD_WEBHOOK"

scoring:
  min_score: 4

  keywords:
    ransomware: 3
    phishing: 2
    malware: 2
    apt: 3
    c2: 2
    botnet: 2
    exploit: 2
    credential: 2

  threat_level_scores:
    "1": 3
    "2": 2
    "3": 1
    "4": 0

  attribute_thresholds:
    - count: 10
      score: 1
    - count: 50
      score: 1

  published_score: 2
  tag_count_score: 1
  galaxy_tag_score: 3
  object_score: 2

  noisy_title_keywords:
    - feed
    - imported
    - auto
    - automatic
    - bulk

  noisy_penalty: 2